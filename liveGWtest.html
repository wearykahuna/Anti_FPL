<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anti-FPL · Live Leaderboard</title>
  <style>
    :root {
      --bg:#f5f5f5; --surface:#fff; --border:#e0e0e0;
      --text:#111; --muted:#888;
      --accent:#d62828; --good:#1a7f4b; --warn:#b86e00; --live:#d62828;
      --font:'Inter',system-ui,sans-serif;
      --mono:'JetBrains Mono','Fira Code',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:24px 16px 48px}

    header{max-width:900px;margin:0 auto 32px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .logo{font-size:1.6rem;font-weight:800;letter-spacing:-0.04em}
    .logo span{color:var(--accent)}
    .meta{text-align:right;font-size:0.78rem;color:var(--muted);font-family:var(--mono);line-height:1.8}

    .live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(214,40,40,0.12);
                border:1px solid rgba(214,40,40,0.3);color:var(--live);font-size:0.7rem;font-weight:700;
                letter-spacing:0.1em;padding:3px 10px;border-radius:99px;margin-bottom:4px}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

    .gw-bar{max-width:900px;margin:0 auto 20px;display:flex;gap:12px;flex-wrap:wrap}
    .gw-pill{background:var(--surface);border:1px solid var(--border);border-radius:8px;
             padding:8px 16px;font-size:0.78rem;color:var(--muted)}
    .gw-pill strong{color:var(--text);font-size:1rem;display:block}

    .refresh-bar{max-width:900px;margin:0 auto 16px;display:flex;justify-content:space-between;
                 font-size:0.75rem;color:var(--muted);font-family:var(--mono)}

    .table-wrap{max-width:900px;margin:0 auto;overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:0.85rem}
    thead th{text-align:left;padding:10px 14px;font-size:0.68rem;font-weight:600;letter-spacing:0.08em;
             color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
    thead th.r{text-align:right}
    tbody tr.team-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
    tbody tr.team-row:hover,tbody tr.team-row.expanded{background:var(--surface)}
    td{padding:12px 14px;vertical-align:middle;white-space:nowrap}
    td.r{text-align:right;font-family:var(--mono)}

    .pos{font-family:var(--mono);font-size:0.75rem;color:var(--muted);width:32px}
    .pos.top3{color:var(--good);font-weight:700}

    .team-name{font-weight:600;font-size:0.88rem}
    .manager-name{font-size:0.72rem;color:var(--muted);margin-top:2px}

    .chips-row{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
    .chip-pill{display:inline-flex;align-items:center;justify-content:center;min-width:22px;
               padding:1px 4px;font-size:0.55rem;font-weight:700;letter-spacing:0.05em;
               border-radius:3px;line-height:1.5;border:1px solid transparent}
    .chip-used{background:#ececec;color:#aaa;border-color:#ddd}
    .chip-avail{background:rgba(59,130,246,0.12);color:#2563eb;border-color:rgba(59,130,246,0.3)}
    .chip-live{background:rgba(255,176,59,0.25);color:var(--warn);border-color:rgba(255,176,59,0.5);
               animation:chip-pulse 1.4s ease-in-out infinite}
    @keyframes chip-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.96)}}

    .gw-pts{font-family:var(--mono);font-weight:700;font-size:1rem}
    .total-pts{font-family:var(--mono);font-size:0.88rem}
    .pen-tag{font-size:0.68rem;color:var(--accent);font-family:var(--mono)}
    .pending-tag{font-size:0.68rem;color:var(--warn);font-family:var(--mono)}
    .live-score{color:var(--live)}

    .chevron{font-size:0.7rem;color:var(--muted);transition:transform 0.2s;display:inline-block}
    .chevron.open{transform:rotate(180deg)}

    tr.detail-row td{padding:0;border-bottom:1px solid var(--border)}
    .detail-inner{padding:16px 14px 16px 46px;display:grid;
                  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;background:#f9f9f9}
    .detail-item{display:flex;flex-direction:column;gap:2px}
    .detail-label{font-size:0.65rem;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase}
    .detail-value{font-family:var(--mono);font-size:0.88rem}
    .detail-value.pen{color:var(--accent)}
    .detail-value.ok{color:var(--good)}

    .squad-section{padding:0 14px 16px 14px;background:#f9f9f9;border-top:1px solid var(--border)}
    .squad-header{display:flex;justify-content:space-between;padding:10px 0 6px;font-size:0.68rem;
                  letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);
                  border-bottom:1px solid var(--border);margin-bottom:4px}
    .squad-legend{font-family:var(--mono);letter-spacing:0;text-transform:none}
    .player-row{display:grid;grid-template-columns:36px 1fr 48px 48px 48px;gap:8px;align-items:center;
                padding:5px 0;font-size:0.82rem;border-bottom:1px dashed #ececec}
    .player-row.bench{background:#f0f0f0;padding-left:4px;padding-right:4px;margin:0 -4px}
    .player-row.inactive{opacity:0.5}
    .player-pos{font-family:var(--mono);font-size:0.7rem;color:var(--muted);text-align:center}
    .player-name{font-weight:500}
    .player-tag{display:inline-block;font-size:0.62rem;color:var(--warn);font-weight:700;margin-left:4px}
    .player-club{display:inline-block;font-size:0.6rem;color:var(--muted);letter-spacing:0.05em;margin-left:4px}
    .player-mins,.player-pts,.player-anti{font-family:var(--mono);text-align:right;font-size:0.8rem}
    .player-mins{color:var(--muted)}
    .player-anti{color:var(--accent);font-weight:600}

    .fix-icon{display:inline-block;width:14px;text-align:center;font-size:0.7rem;margin-right:2px;font-weight:700}
    .fix-icon.done{color:var(--good)}
    .fix-icon.live{color:var(--live);animation:pulse 1.4s ease-in-out infinite}
    .fix-icon.upc{color:var(--muted)}

    .state-msg{max-width:900px;margin:80px auto;text-align:center;color:var(--muted);
               font-family:var(--mono);font-size:0.85rem;line-height:2}
    .state-msg .big{font-size:2rem;display:block;margin-bottom:12px}

    footer{max-width:900px;margin:40px auto 0;font-size:0.72rem;color:var(--muted);
           border-top:1px solid var(--border);padding-top:16px;display:flex;
           justify-content:space-between;flex-wrap:wrap;gap:8px}

    @media (max-width:600px){
      .logo{font-size:1.3rem}
      td,th{padding:10px 8px}
      .detail-inner{padding-left:14px}
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo"><span>ANTI</span>FPL</div>
    <div style="font-size:0.72rem;color:var(--muted);margin-top:4px">lowest score wins · 2025/26</div>
  </div>
  <div class="meta">
    <div id="live-badge-wrap"></div>
    <div id="last-updated">—</div>
    <div id="next-refresh">—</div>
  </div>
</header>

<div class="gw-bar" id="gw-bar"></div>

<div class="refresh-bar">
  <span id="team-count">Loading...</span>
  <span id="next-refresh-bar" style="font-size:0.75rem;color:var(--muted);font-family:var(--mono)">—</span>
</div>

<div class="table-wrap">
  <div id="state-msg" class="state-msg"><span class="big">⚽</span>Loading leaderboard...</div>
  <table id="leaderboard" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>Team</th>
        <th class="r">GW</th>
        <th class="r" id="pens-header">+Pens</th>
        <th class="r">Prev Total</th>
        <th class="r">Total</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer>
  <span>Anti-FPL · 2025/26 Season</span>
  <span>Lowest score wins · Penalties add points</span>
</footer>

<script>
  const SUPABASE_URL = 'https://qudcjhmbextpfdgdxihs.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGNqaG1iZXh0cGZkZ2R4aWhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjEzMTQsImV4cCI6MjA5NDE5NzMxNH0.TRapf8KXSpM2XPrzprIhObi5cp0Sxt2wxel9novZRMA';
  const SEASON      = '2025/26';
  const REFRESH_MS  = 2 * 60 * 1000;

  let refreshTimer, countdownTimer, nextRefreshAt;
  let expandedTeam = null;

  async function sbFetch(table, params = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } });
    if (!r.ok) throw new Error(`${table}: ${r.status} ${r.statusText}`);
    return r.json();
  }

  async function loadData() {
    try {
      // Current GW
      const gwData = await sbFetch('gameweeks',
        `season=eq.${encodeURIComponent(SEASON)}&is_current=eq.true&select=*&limit=1`);
      let currentGw, isLive;
      if (gwData.length > 0) {
        currentGw = gwData[0].gw;
        isLive = !gwData[0].is_finished;
      } else {
        const latest = await sbFetch('gw_scores',
          `season=eq.${encodeURIComponent(SEASON)}&select=gw&order=gw.desc&limit=1`);
        currentGw = latest[0]?.gw || 1;
        isLive = false;
      }

      // Teams (eligible only)
      const teams = await sbFetch('teams',
        `season=eq.${encodeURIComponent(SEASON)}&eligible=eq.true&select=team_id,manager,team_name`);

      // GW scores
      const scores = await sbFetch('gw_scores',
        `season=eq.${encodeURIComponent(SEASON)}&gw=eq.${currentGw}&select=*`);

      // Previous GW for delta/prevTotal
      const prevScores = currentGw > 1
        ? await sbFetch('gw_scores',
            `season=eq.${encodeURIComponent(SEASON)}&gw=eq.${currentGw - 1}&select=team_id,cumulative_standing,anti_total`)
        : [];

      // Selections for this GW
      const selections = await sbFetch('team_gw_selections',
        `season=eq.${encodeURIComponent(SEASON)}&gw=eq.${currentGw}&select=*`);

      // Player IDs from squads → fetch their GW scores
      const playerIds = new Set();
      selections.forEach(s => (s.squad || []).forEach(pid => playerIds.add(pid)));
      const playerScores = playerIds.size
        ? await sbFetch('player_gw_scores',
            `season=eq.${encodeURIComponent(SEASON)}&gw=eq.${currentGw}&player_id=in.(${[...playerIds].join(',')})&select=*`)
        : [];

      // Player reference data
      if (!window.playerNames) {
        const allPlayers = await sbFetch('players',
          `season=eq.${encodeURIComponent(SEASON)}&select=player_id,web_name,position,team_short,team_id`);
        window.playerNames = Object.fromEntries(allPlayers.map(p => [p.player_id, p.web_name]));
        window.playerPositions = Object.fromEntries(allPlayers.map(p => [p.player_id, p.position]));
        window.playerTeams = Object.fromEntries(allPlayers.map(p => [p.player_id, p.team_short]));
        window.playerTeamIds = Object.fromEntries(allPlayers.map(p => [p.player_id, p.team_id]));
      }

      // Fixtures for current GW → derive club fixture status
      const fixtures = await sbFetch('fixtures',
        `season=eq.${encodeURIComponent(SEASON)}&gw=eq.${currentGw}&select=*`);
      // clubStatus: {fpl_team_id: 'finished' | 'live' | 'upcoming'}
      const clubStatus = {};
      fixtures.forEach(f => {
        let st;
        if (f.finished || f.finished_provisional) st = 'finished';
        else if (f.started)                       st = 'live';
        else                                      st = 'upcoming';
        clubStatus[f.team_h] = st;
        clubStatus[f.team_a] = st;
      });
      window.clubStatus = clubStatus;

      // Chips history per team
      const tids = scores.map(s => s.team_id);
      const chipsRows = tids.length
        ? await sbFetch('gw_scores',
            `season=eq.${encodeURIComponent(SEASON)}&team_id=in.(${tids.join(',')})&active_chip=neq.&select=team_id,gw,active_chip`)
        : [];
      const chipsByTeam = {};
      chipsRows.forEach(r => {
        if (!chipsByTeam[r.team_id]) chipsByTeam[r.team_id] = [];
        chipsByTeam[r.team_id].push({ gw: r.gw, chip: r.active_chip });
      });

      const prevStanding = Object.fromEntries(prevScores.map(r => [r.team_id, r.cumulative_standing]));
      const prevTotal    = Object.fromEntries(prevScores.map(r => [r.team_id, r.anti_total]));
      const teamInfo     = Object.fromEntries(teams.map(t => [t.team_id, t]));
      const selectionMap = Object.fromEntries(selections.map(s => [s.team_id, s]));
      const playerScoreMap = Object.fromEntries(playerScores.map(p => [p.player_id, p]));

      render(scores, teamInfo, prevStanding, prevTotal, currentGw, isLive,
             selectionMap, playerScoreMap, chipsByTeam);
      scheduleRefresh();

    } catch (err) {
      console.error('loadData error:', err);
      showError(err.message);
    }
  }

  function buildChipsRow(usedChips, activeChip, currentGw) {
    const chipOrder = ['wildcard', 'freehit', 'bboost', '3xc'];
    const chipShort = { wildcard: 'WC', freehit: 'FH', bboost: 'BB', '3xc': 'TC' };
    const usedCount = {};
    const activeThisGw = {};
    usedChips.forEach(c => {
      usedCount[c.chip] = (usedCount[c.chip] || 0) + 1;
      if (c.gw === currentGw) activeThisGw[c.chip] = true;
    });
    const items = [];
    chipOrder.forEach(name => {
      const used = usedCount[name] || 0;
      const isActive = activeChip === name && activeThisGw[name];
      for (let i = 1; i <= 2; i++) {
        let cls;
        if (i <= used && isActive && i === used) cls = 'chip-live';
        else if (i <= used) cls = 'chip-used';
        else cls = 'chip-avail';
        items.push(`<span class="chip-pill ${cls}" title="${chipShort[name]}">${chipShort[name]}</span>`);
      }
    });
    return `<div class="chips-row">${items.join('')}</div>`;
  }

  function render(scores, teamInfo, prevStanding, prevTotal, gw, isLive,
                  selectionMap, playerScoreMap, chipsByTeam) {

    // Live badge
    document.getElementById('live-badge-wrap').innerHTML = isLive
      ? `<div class="live-badge"><span class="live-dot"></span>LIVE · GW${gw}</div>`
      : `<div style="font-size:0.72rem;color:var(--muted)">GW${gw} · Final</div>`;

    // Last updated
    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}`;

    // GW summary pills
    const displayPts = scores.map(s => isLive ? (s.fpl_raw_pts ?? 0) : (s.anti_gw_pts ?? 0));
    const best  = displayPts.length ? Math.min(...displayPts) : 0;
    const worst = displayPts.length ? Math.max(...displayPts) : 0;
    const avg   = displayPts.length ? Math.round(displayPts.reduce((a, b) => a + b, 0) / displayPts.length) : 0;
    document.getElementById('gw-bar').innerHTML = `
      <div class="gw-pill"><strong>${gw}</strong>Gameweek</div>
      <div class="gw-pill"><strong>${scores.length}</strong>Teams</div>
      <div class="gw-pill"><strong>${best}</strong>Best GW score</div>
      <div class="gw-pill"><strong>${worst}</strong>Worst GW score</div>
      <div class="gw-pill"><strong>${avg}</strong>GW average</div>
    `;
    document.getElementById('team-count').textContent =
      `${scores.length} eligible teams · click any row to expand squad`;

    // Sort by displayed total ascending (lowest = best)
    const sorted = [...scores].sort((a, b) => {
      const aTot = isLive ? ((prevTotal[a.team_id] ?? 0) + (a.fpl_raw_pts ?? 0)) : (a.anti_total ?? 99999);
      const bTot = isLive ? ((prevTotal[b.team_id] ?? 0) + (b.fpl_raw_pts ?? 0)) : (b.anti_total ?? 99999);
      return aTot - bTot;
    });

    document.getElementById('pens-header').textContent = isLive ? 'Pending' : '+Pens';

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    sorted.forEach((s, idx) => {
      const info       = teamInfo[s.team_id] || {};
      const pos        = idx + 1;
      const prevPos    = prevStanding[s.team_id];
      const move       = prevPos ? prevPos - pos : 0;
      const activeChip = s.active_chip || '';
      const hasPens    = s.total_pens_gw > 0;
      const isExpanded = expandedTeam === s.team_id;
      const prevTot    = prevTotal[s.team_id];

      const displayGw = isLive ? (s.fpl_raw_pts ?? '—') : (s.anti_gw_pts ?? '—');
      const displayTot = isLive
        ? ((prevTot ?? 0) + (s.fpl_raw_pts ?? 0))
        : (s.anti_total ?? '—');

      const moveStr = move > 0
        ? `<span style="color:var(--good);font-size:0.65rem"> ▲${move}</span>`
        : move < 0
        ? `<span style="color:var(--accent);font-size:0.65rem"> ▼${Math.abs(move)}</span>`
        : '';

      const chipsHtml = buildChipsRow(chipsByTeam[s.team_id] || [], activeChip, gw);

      // ── Team row ──
      const tr = document.createElement('tr');
      tr.className = `team-row${isExpanded ? ' expanded' : ''}`;
      tr.dataset.teamId = s.team_id;
      tr.innerHTML = `
        <td class="pos ${pos <= 3 ? 'top3' : ''}">${pos}${moveStr}</td>
        <td>
          <div class="team-name">
            <a href="https://fantasy.premierleague.com/entry/${s.team_id}/event/${gw}"
               target="_blank" rel="noopener"
               style="color:inherit;text-decoration:none;border-bottom:1px dotted var(--muted)"
               onclick="event.stopPropagation()">${info.team_name || s.team_id}</a>
          </div>
          <div class="manager-name">${info.manager || ''}</div>
          ${chipsHtml}
        </td>
        <td class="r"><div class="gw-pts ${isLive ? 'live-score' : ''}">${displayGw}</div></td>
        <td class="r">${hasPens
          ? `<span class="${isLive ? 'pending-tag' : 'pen-tag'}">${isLive ? '⏳' : '+'}${s.total_pens_gw}</span>`
          : '<span style="color:var(--muted)">—</span>'}</td>
        <td class="r" style="color:var(--muted);font-family:var(--mono);font-size:0.78rem">${prevTot ?? '—'}</td>
        <td class="r total-pts">${displayTot}</td>
        <td style="width:24px;text-align:center"><span class="chevron ${isExpanded ? 'open' : ''}">▾</span></td>
      `;
      tr.addEventListener('click', () => toggleExpand(s.team_id));
      tbody.appendChild(tr);

      // ── Detail row ──
      const selection = selectionMap[s.team_id];
      let squadHtml = '';
      if (selection?.squad?.length) {
        const captainId = selection.captain_id;
        const viceId    = selection.vice_captain_id;
        const playerRows = selection.squad.map((pid, i) => {
          const isStarter = i < 11;
          const isCap     = pid === captainId;
          const isVice    = pid === viceId;
          const p         = playerScoreMap[pid] || {};
          const name      = (window.playerNames && window.playerNames[pid]) || `#${pid}`;
          const posShort  = (window.playerPositions && window.playerPositions[pid]) || '';
          const club      = (window.playerTeams && window.playerTeams[pid]) || '';
          const clubId    = window.playerTeamIds?.[pid];
          const fixState  = window.clubStatus?.[clubId] || 'unknown';
          const tag       = isCap ? '(C)' : isVice ? '(V)' : '';
          const pts       = p.base_pts != null ? p.base_pts : '—';
          const antiPts   = p.anti_pts != null ? p.anti_pts : '—';
          const mins      = p.minutes != null ? p.minutes : '—';
          const inactive  = p.minutes === 0;

          // Fixture status indicator
          let fixIcon = '';
          if (fixState === 'finished')      fixIcon = '<span class="fix-icon done" title="Fixture finished">✓</span>';
          else if (fixState === 'live')     fixIcon = '<span class="fix-icon live" title="Fixture in play">●</span>';
          else if (fixState === 'upcoming') fixIcon = '<span class="fix-icon upc"  title="Fixture upcoming">○</span>';

          return `
            <div class="player-row ${isStarter ? '' : 'bench'} ${inactive ? 'inactive' : ''}">
              <span class="player-pos">${posShort || (isStarter ? i+1 : 'B')}</span>
              <span class="player-name">${fixIcon} ${name}
                ${club ? `<span class="player-club">${club}</span>` : ''}
                ${tag ? `<span class="player-tag">${tag}</span>` : ''}
              </span>
              <span class="player-mins">${mins}'</span>
              <span class="player-pts">${pts}</span>
              <span class="player-anti">${antiPts}</span>
            </div>
          `;
        }).join('');
        squadHtml = `
          <div class="squad-section">
            <div class="squad-header">
              <span>Squad (GW${gw})</span>
              <span class="squad-legend">mins · pts · anti</span>
            </div>
            ${playerRows}
          </div>
        `;
      }

      const penPrefix = isLive ? 'Pending: ' : '';
      const detailTr = document.createElement('tr');
      detailTr.className = 'detail-row';
      detailTr.style.display = isExpanded ? '' : 'none';
      detailTr.innerHTML = `
        <td colspan="7">
          <div class="detail-inner">
            ${detailItem('FPL Raw', s.fpl_raw_pts ?? '—')}
            ${detailItem(penPrefix + 'Transfer Hits', s.hit_pts || 0, s.hit_pts > 0)}
            ${detailItem(penPrefix + 'Inactive Pen', s.inactive_pen_pts || 0, s.inactive_pen_pts > 0)}
            ${detailItem(penPrefix + 'Bank Pen', s.bank_pen_pts || 0, s.bank_pen_pts > 0)}
            ${detailItem(penPrefix + 'C/VC Pen', s.cvc_pen_pts || 0, s.cvc_pen_pts > 0)}
            ${detailItem(penPrefix + 'Chip Pen', s.chip_pen_pts || 0, s.chip_pen_pts > 0)}
            ${detailItem('Bank', s.bank != null ? `£${(s.bank / 10).toFixed(1)}m` : '—', false, s.bank_pen)}
            ${detailItem('Inactive Players', s.inactive_count ?? '—')}
            ${detailItem('Prev Total', prevTot ?? '—')}
            ${detailItem(isLive ? 'Current Total (Live)' : 'Anti Total', displayTot)}
            ${s.unused_chips?.length ? detailItem('Unused Chips', s.unused_chips.join(', '), true) : ''}
          </div>
          ${squadHtml}
        </td>
      `;
      tbody.appendChild(detailTr);
    });

    document.getElementById('state-msg').style.display  = 'none';
    document.getElementById('leaderboard').style.display = '';
  }

  function detailItem(label, value, isPen = false, isWarn = false) {
    const cls = (isPen || isWarn) ? 'pen' : value === 0 ? 'ok' : '';
    return `<div class="detail-item"><span class="detail-label">${label}</span><span class="detail-value ${cls}">${value}</span></div>`;
  }

  function toggleExpand(teamId) {
    expandedTeam = (expandedTeam === teamId) ? null : teamId;
    loadData();
  }

  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    clearInterval(countdownTimer);
    nextRefreshAt = Date.now() + REFRESH_MS;
    refreshTimer = setTimeout(loadData, REFRESH_MS);
    countdownTimer = setInterval(() => {
      const secs = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
      const mm = String(Math.floor(secs / 60)).padStart(2, '0');
      const ss = String(secs % 60).padStart(2, '0');
      document.getElementById('next-refresh').textContent = `Next refresh ${mm}:${ss}`;
      if (secs === 0) clearInterval(countdownTimer);
    }, 1000);
  }

  function showError(msg) {
    document.getElementById('state-msg').innerHTML = `
      <span class="big">⚠️</span>Failed to load data<br>
      <span style="font-size:0.75rem">${msg}</span>
    `;
    document.getElementById('state-msg').style.display = '';
    document.getElementById('leaderboard').style.display = 'none';
  }

  loadData();
</script>
</body>
</html>
