name: Migrate & Snapshot

on:
  # Run manually from GitHub Actions tab at any time
  workflow_dispatch:

  schedule:
    # Every 5 minutes Saturday and Sunday 12:00–22:00 UTC (match windows)
    - cron: '*/5 12-22 * * 6,0'
    # Every 5 minutes Friday 19:00–22:00 UTC (Friday night fixtures)
    - cron: '*/5 19-22 * * 5'
    # Once daily at 08:00 UTC Mon–Thu (keep Supabase current)
    - cron: '0 8 * * 1-4'

jobs:
  migrate-and-snapshot:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit snapshot files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml postgrest python-dotenv

      - name: Run migration
        working-directory: Backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python migrate_to_supabase.py

      - name: Run snapshot
        working-directory: Backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python snapshot.py

      - name: Commit snapshot to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          # Only commit if there's something new
          git diff --cached --quiet || git commit -m "snapshot: GW update $(date +'%Y-%m-%d %H:%M UTC')"
          git push