name: Update Anti-FPL Data

on:
  schedule:
    # Every day at 08:00 UTC — morning refresh in case Anti-FPL pythonanywhere updated overnight
    - cron: '0 8 * * *'
    # Every day at 23:30 UTC — evening refresh after GW results and Anti-FPL site recalculates
    - cron: '30 23 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push data.json back to the repo

concurrency:
  group: data-update
  cancel-in-progress: false
  
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch_data.py
        run: python fetch_data.py

      - name: Commit and push data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json picks_cache.json
          # Only commit if something actually changed — avoids empty commits
          git pull --rebase origin main
          git push
          if git diff --staged --quiet; then
            echo "data.json unchanged — nothing to commit"
          else
            git commit -m "chore: auto-update data.json [skip ci]"
            git push
          fi
  
